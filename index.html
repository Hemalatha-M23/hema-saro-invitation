<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hema ♥ Saro Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  overflow-x:hidden;
  font-family:'Playfair Display',serif;
  background:black;
}

.page{
  min-height:100vh;
  width:100%;
  position:relative;
}

/* ================= SCROLL ================= */

.scroll-down{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Great Vibes',cursive;
  font-size:2em;
  color:#fff;
  text-shadow:0 0 10px #ff99cc,0 0 20px gold;
  animation:scrollBounce 1.8s infinite;
  z-index:20;
}

@keyframes scrollBounce{
  0%{transform:translateX(-50%) translateY(0);opacity:0.5;}
  50%{transform:translateX(-50%) translateY(10px);opacity:1;}
  100%{transform:translateX(-50%) translateY(0);opacity:0.5;}
}

/* ================= PAGE 1 ================= */

#page1{
  background:url('sh2.png') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

#page1 h2{
  font-family:'Great Vibes',cursive;
  font-size:4em;
  color:#ffcc33;
  text-shadow:0 0 10px #fff,0 0 20px #ff6699,0 0 40px gold;
}

#page1 .button{
  background:linear-gradient(145deg,#ff3366,#ff6699);
  color:white;
  border:4px solid #ffd700;
  border-radius:50%;
  width:120px;
  height:120px;
  font-size:2em;
  cursor:pointer;
  box-shadow:0 0 20px #ff99cc,0 0 40px gold;
}

/* ================= PAGE 2 (UPDATED) ================= */

#page2{
  background:url('image1sh1.png') center/cover no-repeat;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center; /* CENTER EVERYTHING */
  text-align:center;
  padding:60px 20px;
  min-height:100vh;
}

/* BIG NAME */
#page2 .name{
  font-family:'Great Vibes',cursive;
  font-size:6.8em;   /* increased */
  color:#111;
  text-shadow:0 0 10px gold,0 0 20px #ffd700,0 0 40px #fff0b3;
  animation:zoomGlow 3s infinite alternate;
}

/* WEDS */
#page2 .weds{
  font-size:1.8em;
  font-style:italic;
  color:#222;
  text-shadow:0 0 10px gold;
}

/* CENTER PARAGRAPH */
#page2 p{
  font-size:1.6em;
  color:black;
  font-style:italic;
  line-height:1.9;
  max-width:850px;
  margin-top:30px;
  text-shadow:0 0 10px gold;
  animation:floatText 4s ease-in-out infinite;
}

/* ================= PAGE 3 ================= */

#page3{
  background:url('sh3.png') center top/cover no-repeat;
  text-align:center;
  padding:40px 20px 120px;
}

/* ================= ANIMATIONS ================= */

@keyframes zoomGlow{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

@keyframes floatText{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

@keyframes scrollBounce{
  0%{transform:translateX(-50%) translateY(0);opacity:0.5;}
  50%{transform:translateX(-50%) translateY(10px);opacity:1;}
  100%{transform:translateX(-50%) translateY(0);opacity:0.5;}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page">
  <h2>Tap to Reveal</h2>
  <button class="button" onclick="openInvitation()">H ♥ S</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

  <h1>
    <span class="name">Saro</span>
    <span class="weds">weds</span>
    <span class="name">Hema</span>
  </h1>

  <p>
    With the blessings of our families and the joy in our hearts,
    we are excited to begin our forever together.
  </p>

  <div class="scroll-down">Scroll Down ↓</div>
</div>

<script>

function openInvitation(){
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "flex";
  document.getElementById("page2").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
