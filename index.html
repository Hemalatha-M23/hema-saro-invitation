<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hema ♥ Saro Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  overflow-x:hidden;
  font-family:'Playfair Display',serif;
  background:black;
}

.page{
  min-height:100vh;
  width:100%;
  position:relative;
}

/* =========================================================
   SCROLL DOWN
========================================================= */

.scroll-down{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Great Vibes',cursive;
  font-size:2em;
  color:#ffffff;
  text-shadow:0 0 10px #ff99cc,0 0 20px gold;
  animation:scrollBounce 1.8s infinite;
  z-index:20;
}

@keyframes scrollBounce{
  0%{transform:translateX(-50%) translateY(0);opacity:0.5;}
  50%{transform:translateX(-50%) translateY(10px);opacity:1;}
  100%{transform:translateX(-50%) translateY(0);opacity:0.5;}
}

/* =========================================================
   PAGE 1
========================================================= */

#page1{
  background:url('sh2.png') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

#page1::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle, rgba(255,215,0,0.4) 2px, transparent 3px);
  background-size:40px 40px;
  animation:sparkleMove 15s linear infinite;
  opacity:0.7;
}

#page1 h2{
  position:relative;
  z-index:2;
  font-family:'Great Vibes',cursive;
  font-size:4em;
  color:#ffcc33;
  margin-bottom:25px;
  text-shadow:0 0 10px #fff,0 0 20px #ff6699,0 0 40px gold;
  animation:glowText 2s infinite alternate;
}

#page1 .button{
  position:relative;
  z-index:2;
  background:linear-gradient(145deg,#ff3366,#ff6699);
  color:white;
  border:4px solid #ffd700;
  border-radius:50%;
  width:120px;
  height:120px;
  font-size:2em;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:35px;
  box-shadow:0 0 20px #ff99cc,0 0 40px gold;
  animation:pulseGlow 2s infinite;
}

#page1 h1{
  position:relative;
  z-index:2;
  font-size:2em;
  line-height:1.5;
  padding:0 40px;
  max-width:900px;
  color:#b22222;
  font-weight:bold;
  text-shadow:0 0 10px #fff,0 0 20px #ffd700;
  animation:fadeUp 2s ease;
}

/* =========================================================
   PAGE 2 (FIXED)
========================================================= */

#page2{

  background:url('image1sh1.png') center/cover no-repeat;

  display:none;

  flex-direction:column;
  align-items:center;
  text-align:center;

  padding:60px 20px;

  min-height:100vh;

  justify-content:space-between; /* ⭐ KEY FIX */
}

#page2 h1{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:15px;
}

#page2 .name{
  font-family:'Great Vibes',cursive;
  font-size:5em;
  color:#111;
  text-shadow:0 0 10px gold,0 0 20px #ffd700,0 0 40px #fff0b3;
  animation:zoomGlow 3s infinite alternate;
}

#page2 .weds{
  font-family:'Playfair Display',serif;
  font-size:1.2em;
  font-style:italic;
  color:#222;
  margin-top:25px;
  text-shadow:0 0 10px gold;
}

#page2 p{
  font-size:1.3em;
  color:black;
  font-style:italic;
  line-height:1.8;
  margin:0;
  text-shadow:0 0 10px gold;
  animation:floatText 4s ease-in-out infinite;
  max-width:800px;
}

/* =========================================================
   PAGE 3
========================================================= */

#page3{
  background:url('sh3.png') center top/cover no-repeat;
  text-align:center;
  padding:40px 20px 120px;
}

#page3 h2{
  color:white;
  font-size:2.2em;
  font-family:'Great Vibes',cursive;
  text-shadow:0 0 15px #ff99cc,0 0 25px gold;
}

#scratchCard{
  position:relative;
  width:300px;
  height:270px;
  margin:15cm auto 0;
}

#weddingDate{
  position:absolute;
  top:0;
  left:0;
  width:300px;
  height:270px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1;
  opacity:0;
  transition:opacity 0.8s ease;
}

#weddingDate.show{opacity:1;}

.date-content{
  width:190px;
  height:190px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  font-size:2em;
  font-family:'Great Vibes',cursive;
  color:#ffd700;
  text-shadow:0 0 10px #fff,0 0 25px gold;
}

#scratchCanvas{
  position:absolute;
  top:0;
  left:0;
  z-index:2;
}

/* PAGE 4 unchanged */

#page4{
  background:linear-gradient(rgba(0,0,0,0.2),rgba(0,0,0,0.2)),url('sh44.png') center/cover no-repeat;
  text-align:center;
  padding:40px 20px 120px;
}

/* ANIMATIONS */

@keyframes glowText{
  from{ text-shadow:0 0 10px #fff,0 0 20px #ff6699,0 0 30px gold;}
  to{ text-shadow:0 0 20px #fff,0 0 40px #ff3366,0 0 60px gold;}
}

@keyframes pulseGlow{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes sparkleMove{
  from{background-position:0 0;}
  to{background-position:200px 200px;}
}

@keyframes zoomGlow{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

@keyframes floatText{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page">
  <h2>Tap to Reveal</h2>
  <button class="button" onclick="openInvitation()">H ♥ S</button>
  <h1>We can’t wait to share our happiest moment with you!</h1>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

  <div>
    <h1>
      <span class="name">Saro</span> <h1>
    <h2>  <span class="weds">weds</span> <h2>
     <h3> <span class="name">Hema</span>
    </h3>
  </div>

  <p>
    With the blessings of our families and the joy in our hearts,
    we are excited to begin our forever together.
  </p>

  <div class="scroll-down">Scroll Down ↓</div>

</div>

<!-- PAGE 3 and PAGE 4 remain SAME as your original code -->

<script>

window.onload = function(){
  window.scrollTo(0,0);
  document.getElementById("page1").style.display = "flex";
  document.getElementById("page2").style.display = "none";
};

function openInvitation(){
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "flex";
  document.getElementById("page2").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
